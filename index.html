<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>婕樂纖即時競賽系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0810;--card:#1a1020;--card2:#221530;--border:#3d2550;--rose:#e8a0b0;--gold:#d4a843;--champ:#f0d080;--pink:#c96090;--purple:#8b5cf6;--green:#34d399;--red:#f87171;--text:#f5eef8;--muted:#9070a0;--silver:#c8b8d8}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 0%,#3d105022,transparent 70%),radial-gradient(ellipse 50% 50% at 80% 100%,#8b2a5022,transparent 70%);pointer-events:none;z-index:0}
#LS,#PS,#HA{position:relative;z-index:1}
#LS{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
#PS,#HA{display:none}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.nav{display:flex;background:#120a1a;border-bottom:1px solid var(--border);flex-shrink:0}
.nav button{flex:1;padding:11px 2px;background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav button.on{color:var(--rose);border-bottom-color:var(--rose);font-weight:700}
.sbar{background:#120a1a;border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.live{background:var(--green)!important;box-shadow:0 0 8px var(--green);animation:bl 1.2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.stxt{flex:1;color:var(--muted)}
.rbadge{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;padding:2px 12px;border-radius:20px;font-size:11px;font-weight:700}
.pages{flex:1;overflow-y:auto}
.page{display:none;padding:16px;max-width:580px;margin:0 auto}
.page.on{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--rose)44,transparent)}
.sec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:700}
.div{height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);margin:12px 0}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:10px;border:none;font-size:13px;cursor:pointer;font-weight:700;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.95)}
.bp{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff}
.bg{background:linear-gradient(135deg,#34d399,#059669);color:#fff}
.br{background:linear-gradient(135deg,#f87171,#dc2626);color:#fff}
.bgh{background:transparent;border:1px solid var(--border);color:var(--text)}
.bsm{padding:6px 12px;font-size:12px;border-radius:8px}
.bgold{background:linear-gradient(135deg,var(--gold),var(--champ));color:#1a1020}
input[type=text],input[type=number]{background:#110818;border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:14px;width:100%}
input:focus{outline:none;border-color:var(--rose)}
input[type=color]{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);padding:2px;cursor:pointer;background:none}
.vis-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.vis-opt{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:12px;cursor:pointer}
.vis-opt.on{border-color:var(--rose);background:#2a1535;color:var(--rose);font-weight:700}
.rpanel{border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;background:var(--card)}
.rpanel.live{border-color:var(--green);background:linear-gradient(135deg,#0a2018,#111820)}
.qr-wrap{display:inline-block;padding:10px;background:#fff;border-radius:12px;margin-bottom:8px}
.qr-url{font-size:11px;color:var(--rose);word-break:break-all;padding:8px 12px;background:#110818;border-radius:8px;border:1px solid var(--border)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.tchip{padding:16px 8px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.tchip.on{border-width:2px}
.shero{text-align:center;padding:20px 0 12px}
.snum{font-size:80px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slbl{font-size:13px;color:var(--muted);margin-top:6px}
.rpill{border-radius:20px;padding:8px 18px;font-size:14px;text-align:center;margin-bottom:12px;border:1px solid var(--border);background:var(--card2)}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.abtn{padding:20px 0;border-radius:14px;border:none;font-size:28px;font-weight:900;cursor:pointer;color:#fff}
.abtn:active{transform:scale(.91)}
.crow{display:flex;gap:8px}.crow input{flex:1}
.mrow{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:5px;background:var(--card2);font-size:13px;border:1px solid transparent}
.mrow.me{border-color:var(--rose)66}
.mrnk{width:24px;text-align:center;font-weight:700}.mnm{flex:1;font-weight:600}.msc{font-weight:800}
.arow{display:flex;align-items:center;gap:8px;background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border);flex-wrap:wrap}
.asc{font-size:24px;font-weight:900;min-width:48px;text-align:right}
.actrl{display:flex;gap:5px;align-items:center;margin-left:auto}
.actrl input{width:54px;text-align:center;padding:6px}
.hlist{max-height:200px;overflow-y:auto}
.hrow{display:grid;grid-template-columns:50px 1fr auto auto;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid #3d255033;font-size:12px}
.ht{color:var(--muted);font-size:11px}.hp{font-weight:800}
.pos{color:var(--green)}.negc{color:var(--red)}
.stbtn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
.stbtn.on{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}
.modal-bg{display:none;position:fixed;inset:0;z-index:900;background:#000000aa;backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:380px;width:92%;text-align:center;position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--rose),transparent)}
.modal h2{font-size:20px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal p{font-size:13px;color:var(--muted);margin-bottom:20px}
.mbtns{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.mbtn{padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;text-align:left}
.mbtn:hover{border-color:var(--rose)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:700;transition:.25s;opacity:0;pointer-events:none;z-index:9999}
.toast.on{transform:translateX(-50%);opacity:1}
#proj{display:none;position:fixed;inset:0;z-index:800;background:#05020a;overflow:hidden}
#proj.on{display:block}
#pstage{
  position:absolute;
  left:0;top:0;
  width:100%;height:100%;
  display:flex;flex-direction:column;overflow:hidden;
  font-size:16px;
}
#pstage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 60% at 15% 50%,#3d105018,transparent 70%),radial-gradient(ellipse 40% 50% at 85% 50%,#8b2a5018,transparent 70%);pointer-events:none}
.ph{display:flex;align-items:center;justify-content:space-between;padding:0 3%;flex-shrink:0;position:relative;z-index:1}
.pt{font-weight:900;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.pmeta{display:flex;gap:16px;align-items:center}
.pround{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-radius:20px;padding:2px 16px;font-weight:800}
.pclk{color:var(--muted);font-weight:500}
.pboards{flex:1;display:grid;gap:2%;padding:0 2%;min-height:0;align-items:start;overflow:hidden;position:relative;z-index:1}
.pboards.dual{grid-template-columns:1fr 1fr}.pboards.single{grid-template-columns:1fr}
.pcol{display:flex;flex-direction:column}
.pcol-title{font-weight:800;text-align:center;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;letter-spacing:2px;flex-shrink:0;border-bottom:1px solid var(--border)}
.prow{display:grid;align-items:center;gap:1%;border-radius:10px;padding:0 2%;border:1px solid transparent;flex-shrink:0;grid-template-columns:9% 35% 1fr 15%}
.prow.r1{background:linear-gradient(135deg,#2a1800cc,#1a1028cc);border-color:var(--champ)}
.prow.r2{background:linear-gradient(135deg,#201828cc,#1a1028cc);border-color:var(--silver)}
.prow.r3{background:linear-gradient(135deg,#1e1400cc,#1a1028cc);border-color:#cd9f6088}
.prow.rn{background:#0f0818cc;border-color:#3d2550}
.prnk{font-weight:900;text-align:center}
.r1 .prnk{color:var(--champ)}.r2 .prnk{color:var(--silver)}.r3 .prnk{color:#cd9f60}.rn .prnk{color:var(--muted)}
.pnm{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbw{background:#ffffff0c;border-radius:4px;overflow:hidden}
.pbf{height:100%;border-radius:4px;transition:width .6s ease}
.psc{font-weight:900;text-align:right}
.r1 .psc{color:var(--champ)}.r2 .psc{color:var(--silver)}.r3 .psc{color:#cd9f60}
.pft{display:flex;align-items:center;justify-content:space-between;padding:0 3%;flex-shrink:0;position:relative;z-index:1}
.plive{display:flex;align-items:center;gap:6px;color:var(--rose);font-weight:800}
.plivdot{width:8px;height:8px;background:var(--rose);border-radius:50%;box-shadow:0 0 8px var(--rose);animation:bl 1s infinite}
#pclose{position:absolute;top:10px;right:14px;background:#ffffff14;border:1px solid #ffffff22;color:#fff;padding:5px 16px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;z-index:10}
.pmbtn.on{border-color:var(--rose)!important;color:var(--rose)!important}
#CU,#RV,#CE{display:none;position:absolute;inset:0;z-index:90;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;background:radial-gradient(ellipse at 50% 30%,#2a103888,#05020a 70%)}
#CU.on,#RV.on,#CE.on{display:flex}
#CE{z-index:100}
.rev-in{animation:ri .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes ri{from{transform:scale(0) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.conf{position:absolute;animation:fall linear forwards;pointer-events:none}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.podium{display:flex;align-items:flex-end;gap:20px;z-index:2}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.cer-btn{position:absolute;bottom:5%;right:4%;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:10px 28px;font-weight:800;cursor:pointer}
.le{padding:5px 0;border-bottom:1px solid #3d255033;font-size:11px;font-family:monospace;line-height:1.5}
</style>
</head>
<body>

<div id="LS">
  <div class="spinner"></div>
  <div class="brand">婕樂纖</div>
  <div style="color:var(--muted);font-size:13px" id="ls-msg">連線中...</div>
</div>

<div id="PS">
  <div class="sbar"><div class="sdot" id="pdot"></div><div class="stxt" id="ptxt">連線中...</div><div id="pbadge"></div></div>
  <div style="padding:16px;max-width:500px;margin:0 auto">
    <div id="pwait" style="text-align:center;padding:60px 0">
      <div style="font-size:56px;margin-bottom:16px">⏳</div>
      <div style="font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">等待主持人開局</div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px" id="pwsub">開局後即可選擇組別加分</div>
    </div>
    <div id="pmain" style="display:none">
      <div class="card"><div class="sec">選擇你的組別</div><div class="tgrid" id="ptgrid"></div></div>
      <div id="ppanel" style="display:none">
        <div class="card">
          <div class="shero"><div class="snum" id="pscore">0</div><div class="slbl" id="pname">—</div></div>
          <div class="rpill" id="prank" style="display:none"></div>
          <div class="div"></div>
          <div class="sec">本局加分</div>
          <div class="agrid" id="pagrid"></div>
          <div class="crow"><input type="number" id="pcpts" placeholder="自訂分數" min="1" max="999999"><button class="btn bp" onclick="pAddCustom()">加分</button></div>
        </div>
        <div id="pbcard" class="card" style="display:none"><div class="sec">即時排行</div><div id="pboard"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="HA" style="flex-direction:column;height:100vh">
  <div class="sbar"><div class="sdot" id="hdot"></div><div class="stxt" id="htxt">就緒</div><div id="hbadge"></div></div>
  <nav class="nav">
    <button class="on" onclick="pg('setup',this)">⚙️設定</button>
    <button onclick="pg('admin',this)">🎛️主控</button>
    <button onclick="pg('pctrl',this)">📺投影幕</button>
    <button onclick="pg('log',this)">🐛Log</button>
  </nav>
  <div class="pages">
    <div id="setup-page" class="page on">
      <div style="text-align:center;padding:10px 0 4px"><div class="brand" style="font-size:18px">婕樂纖即時競賽系統</div></div>
      <div class="div"></div>
      <div class="card"><div class="sec">比賽名稱</div><input type="text" id="cname" placeholder="2025 婕樂纖年度競賽" oninput="S.name=this.value;fbSave()"></div>
      <div id="rpanel" class="rpanel">
        <div class="sec">局次控制</div>
        <div id="rinfo" style="font-size:14px;color:var(--muted);margin-bottom:14px">尚未開局</div>
        <div style="margin-bottom:16px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px">參賽者可見度</div>
          <div class="vis-opts">
            <div class="vis-opt" data-v="all" onclick="setVis('all')">👁 全排行</div>
            <div class="vis-opt" data-v="score" onclick="setVis('score')">🔢 只看分數</div>
            <div class="vis-opt" data-v="rank" onclick="setVis('rank')">🏅 只看名次</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn bg" id="btn-start" onclick="startRound()">▶ 開局</button>
          <button class="btn br" id="btn-end" onclick="openEM()" style="display:none">⏹ 結局</button>
        </div>
        <div id="qrarea" style="display:none;margin-top:16px;border-top:1px solid var(--border)44;padding-top:16px">
          <div class="sec">參賽者掃碼加入</div>
          <div style="text-align:center;padding:8px 0">
            <div class="qr-wrap"><img id="qrimg" src="" alt="QR" style="max-width:180px;display:block;border-radius:4px"></div>
            <div class="qr-url" id="qrtxt"></div>
          </div>
          <button class="btn bgh bsm" onclick="copyUrl()" style="margin-top:8px">📋 複製連結</button>
        </div>
      </div>
      <div class="card">
        <div class="sec">快速建立組別</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="btn bsm bgold" onclick="quick(4)">4組</button>
          <button class="btn bsm bgold" onclick="quick(6)">6組</button>
          <button class="btn bsm bgold" onclick="quick(8)">8組</button>
          <button class="btn bsm bgold" onclick="quick(10)">10組</button>
          <button class="btn bsm bgold" onclick="quick(12)">12組</button>
          <button class="btn bsm bgold" onclick="quick(16)">16組</button>
        </div>
      </div>
      <div class="card"><div class="sec">組別列表</div><div id="teamlist"></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn bp" onclick="addTeam()" style="flex:1">＋ 新增組別</button>
          <button class="btn bgh" onclick="resetAll()">🗑 全清</button>
        </div>
      </div>
      <div class="card"><div class="sec">本場累計總分</div><div id="totalboard"></div></div>
    </div>
    <div id="admin-page" class="page">
      <div class="card"><div class="sec" id="adminlbl">主持人加減分</div><div id="adminlist"></div></div>
      <div class="card">
        <div class="sec">歷史紀錄</div>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <button class="btn bgh bsm" onclick="exportCSV('all')">⬇ 全部CSV</button>
          <button class="btn bgh bsm" onclick="exportCSV('round')">⬇ 本局CSV</button>
          <button class="btn br bsm" onclick="clearHist()">清除</button>
        </div>
        <div class="hlist" id="hlist"></div>
      </div>
    </div>
    <div id="pctrl-page" class="page">
      <div class="card">
        <div class="sec">投影幕</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          <button class="btn bp" onclick="openProj()">📺 開啟</button>
          <button class="btn bgh bsm" onclick="closeProj()">關閉</button>
        </div>
        <div class="sec">顯示模式</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          <button class="btn bgh bsm pmbtn" id="bm-dual" onclick="setPM('dual')">本局＋累計</button>
          <button class="btn bgh bsm pmbtn" id="bm-round" onclick="setPM('round')">只看本局</button>
          <button class="btn bgh bsm pmbtn" id="bm-total" onclick="setPM('total')">只看累計</button>
        </div>
        <div class="div"></div>
        <div class="sec">音效</div>
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="stbtn on" id="snd-classic" onclick="setSnd('classic')">🎼 典禮</button>
          <button class="stbtn" id="snd-edm" onclick="setSnd('edm')">🎵 電音</button>
          <button class="stbtn" id="snd-off" onclick="setSnd('off')">🔇 靜音</button>
        </div>
        <div class="div"></div>
        <div class="sec">結局儀式</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn bsm" style="background:linear-gradient(135deg,#7a3500,#3a1500);border:1px solid var(--gold)66;color:var(--champ)" onclick="trigCU()">📊 跑分</button>
          <button class="btn bsm" style="background:linear-gradient(135deg,#7a3500,#3a1500);border:1px solid var(--gold)66;color:var(--champ)" onclick="trigRV()">🏅 揭曉</button>
          <button class="btn bsm" style="background:linear-gradient(135deg,#7a3500,#3a1500);border:1px solid var(--gold)66;color:var(--champ)" onclick="trigCE()">🎊 頒獎</button>
          <button class="btn bgh bsm" onclick="closeCer()">↩ 回排行</button>
        </div>
      </div>
    </div>
    <div id="log-page" class="page">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="sec" style="margin:0">系統 Log</div>
          <div style="display:flex;gap:6px">
            <button class="btn bgh bsm" onclick="drawLog()">刷新</button>
            <button class="btn bgh bsm" onclick="cpLog()">複製</button>
            <button class="btn br bsm" onclick="LOGS.length=0;drawLog()">清除</button>
          </div>
        </div>
        <div id="loglist" style="max-height:65vh;overflow-y:auto"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="emodal">
  <div class="modal">
    <h2>⏹ 結束第 <span id="ernum"></span> 局</h2>
    <p>選擇結局後投影幕呈現方式</p>
    <div class="mbtns">
      <button class="mbtn" onclick="doEnd('full')">📊 跑分 → 🏅 揭曉 → 🎊 頒獎</button>
      <button class="mbtn" onclick="doEnd('reveal')">🏅 直接揭曉 → 🎊 頒獎</button>
      <button class="mbtn" onclick="doEnd('ceremony')">🎊 直接頒獎</button>
      <button class="mbtn" onclick="doEnd('none')">📋 只結局</button>
    </div>
    <button class="btn bgh bsm" onclick="closeEM()">取消</button>
  </div>
</div>

<div id="proj">
  <button id="pclose" onclick="closeProj()">✕ 關閉</button>
  <div id="pstage">
    <div class="ph" id="ph"><div class="pt" id="ptitle"></div><div class="pmeta"><div class="pround" id="pround"></div><div class="pclk" id="pclk"></div></div></div>
    <div class="pboards dual" id="pboards"></div>
    <div class="pft"><div style="color:var(--muted)">婕樂纖即時競賽系統</div><div class="plive"><div class="plivdot"></div>LIVE</div></div>
    <div id="CU">
      <div style="letter-spacing:3px;color:var(--muted);font-weight:700" id="culbl">最 終 成 績</div>
      <div style="font-weight:900" id="cuname"></div>
      <div style="font-weight:900;line-height:1" id="cunum">0</div>
      <button id="cubtn" onclick="cuNext()" style="display:none;margin-top:4%;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:12px 40px;font-weight:800;cursor:pointer">下一組 ▶</button>
    </div>
    <div id="RV">
      <div id="rvbadge" class="rev-in" style="font-weight:900"></div>
      <div id="rvrank" class="rev-in" style="letter-spacing:2px;color:var(--muted);font-weight:600"></div>
      <div id="rvname" class="rev-in" style="font-weight:900"></div>
      <div id="rvscore" class="rev-in" style="color:var(--muted);font-weight:700"></div>
      <button id="rvbtn" onclick="rvNext()" style="display:none;margin-top:4%;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;padding:12px 40px;font-weight:800;cursor:pointer">下一名 ▶</button>
    </div>
    <div id="CE">
      <div id="conflayer" style="position:absolute;inset:0;pointer-events:none"></div>
      <div class="podium" id="podium"></div>
      <div id="cersub" style="font-weight:900;letter-spacing:4px;z-index:2;margin-top:16px"></div>
      <button class="cer-btn" onclick="closeCer()">↩ 回排行榜</button>
    </div>
  </div>
</div>
<div class="toast" id="toastel"></div>

<script>
'use strict';
/* ══════════════════════════════════════
   CONSTANTS
══════════════════════════════════════ */
var COLORS=['#e8709a','#a78bfa','#34d399','#f0c060','#f87171','#60c0f0','#f0a060','#80e0c0','#e0a0f0','#a0d060','#f0608a','#60a0e8','#e0c060','#60e0a0','#c0a0f8','#f8b060'];
var MDL=['🥇','🥈','🥉'];
var CC=['#e8709a','#a78bfa','#f0c060','#34d399','#f87171','#60c0f0'];
/* 單一 Firebase 節點，最簡單最可靠 */
var FB='https://jele-competition-default-rtdb.asia-southeast1.firebasedatabase.app/state.json';
var isPlayer=location.search.includes('p=1');

/* ══════════════════════════════════════
   STATE
   teams: 陣列，每個元素 {id, name, color, score, total}
   id 是字串，永遠不變
══════════════════════════════════════ */
var S={
  name:'婕樂纖即時競賽系統',
  teams:[],
  hist:[],
  rounds:[],
  currentRound:0,
  roundActive:false,
  vis:'all',
  projMode:'dual'
};

/* ══════════════════════════════════════
   LOG
══════════════════════════════════════ */
var LOGS=[];
function log(tag,msg,d){
  var e={t:ts(),tag:tag,msg:msg,d:d!=null?JSON.stringify(d).slice(0,120):''};
  LOGS.unshift(e);if(LOGS.length>200)LOGS.pop();
  console.log('['+e.t+']['+tag+'] '+msg,d||'');
}
function drawLog(){
  var el=document.getElementById('loglist');if(!el)return;
  el.innerHTML=LOGS.slice(0,80).map(function(e){
    return '<div class="le"><span style="color:var(--muted)">'+e.t+'</span><span style="color:'+(e.tag==='ERR'?'var(--red)':e.tag==='FB'?'var(--green)':'var(--rose)')+'"> ['+e.tag+']</span> '+e.msg+(e.d?'<br><span style="color:var(--muted);padding-left:8px">'+e.d+'</span>':'')+'</div>';
  }).join('');
}
function cpLog(){
  navigator.clipboard.writeText(LOGS.map(function(e){return '['+e.t+']['+e.tag+'] '+e.msg+' '+e.d;}).join('\n')).then(function(){toast('Log 已複製');});
}

/* ══════════════════════════════════════
   FIREBASE — 直接讀寫，無本地快取
══════════════════════════════════════ */
var pollTimer=null;

/* 寫入 Firebase */
function fbSave(){
  fetch(FB,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(S)
  }).then(function(r){
    log('FB','PUT '+(r.ok?'ok':r.status));
  }).catch(function(e){
    log('ERR','PUT',e.message);
    toast('⚠️ 同步失敗，請檢查網路');
  });
}

/* 從 Firebase 讀取一次 */
function fbRead(cb){
  fetch(FB+'?nc='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){if(d&&cb)cb(d);})
    .catch(function(e){log('ERR','fbRead',e.message);});
}

/* 輪詢（SSE 在 Netlify 上不可靠，改用純輪詢）*/
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  var interval=isPlayer?1500:2000;
  pollTimer=setInterval(function(){
    fbRead(function(d){onRemote(d);});
  },interval);
  log('FB','輪詢開始 interval='+interval);
}

/* 收到遠端資料時的處理
   ★ 關鍵：只有 Firebase 版本比本地新才更新，避免覆蓋剛加的分 */
var localVer=0; /* 本地版本號，每次加分 +1 */
var remoteVer=0; /* 上次從 Firebase 收到的版本號 */

function onRemote(d){
  if(!d||!d.teams)return;
  /* 確保 teams 是陣列 */
  if(!Array.isArray(d.teams)){d.teams=Object.values(d.teams);}
  var rv=d._ver||0;
  /* 如果遠端版本不比本地新，忽略（防止蓋掉剛加的分）*/
  if(rv>0&&rv<localVer){
    log('FB','忽略舊版本',{rv:rv,localVer:localVer});
    return;
  }
  /* 偵測新局 → 重置手機選組 */
  var newRound=d.currentRound||0,newActive=!!d.roundActive;
  var oldRound=S.currentRound||0,oldActive=!!S.roundActive;
  if(isPlayer&&(newRound>oldRound||(newActive&&!oldActive))){
    pSel=null;
    log('PLAYER','新局，重置選組');
  }
  remoteVer=rv;
  S=d;
  renderAll();
}

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
(function boot(){
  /* 立刻顯示畫面 */
  document.getElementById('LS').style.display='none';
  if(isPlayer){
    document.getElementById('PS').style.display='block';
  }else{
    var ha=document.getElementById('HA');
    ha.style.display='flex';
  }
  /* 預設資料先顯示 */
  renderAll();
  /* 從 Firebase 讀最新狀態 */
  log('BOOT','開始，讀取 Firebase');
  fbRead(function(d){
    if(d&&d.teams){
      if(!Array.isArray(d.teams))d.teams=Object.values(d.teams);
      if(isPlayer)pSel=null;
      remoteVer=d._ver||0;
      localVer=remoteVer;
      S=d;
      log('BOOT','Firebase 讀取成功',{r:d.currentRound,active:d.roundActive,teams:d.teams.length});
    }else{
      log('BOOT','Firebase 無資料，使用預設');
      S.teams=[];
      for(var i=0;i<6;i++){
        S.teams.push({id:'t'+(i+1),name:'第'+(i+1)+'組',color:COLORS[i],score:0,total:0});
      }
      fbSave();
    }
    renderAll();
    /* 啟動輪詢 */
    startPolling();
  });
})();

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
function pg(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id+'-page').classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='log')drawLog();
  else renderAll();
}

/* ══════════════════════════════════════
   ROUND
══════════════════════════════════════ */
function startRound(){
  if(S.roundActive){toast('已在進行中');return;}
  S.currentRound=(S.currentRound||0)+1;
  S.roundActive=true;
  S.teams.forEach(function(t){t.score=0;});
  log('ROUND','開局',{r:S.currentRound});
  fbSave();renderAll();sfxStart();toast('🟢 第'+S.currentRound+'局開始！');
}
function openEM(){
  if(!S.roundActive){toast('尚未開局');return;}
  document.getElementById('ernum').textContent=S.currentRound;
  document.getElementById('emodal').classList.add('on');
}
function closeEM(){document.getElementById('emodal').classList.remove('on');}
function doEnd(mode){
  closeEM();
  if(!S.rounds)S.rounds=[];
  S.rounds.push({round:S.currentRound,snap:S.teams.map(function(t){return{id:t.id,name:t.name,score:t.score||0};})});
  S.teams.forEach(function(t){t.total=(t.total||0)+(t.score||0);t.score=0;});
  S.roundActive=false;
  log('ROUND','結局',{r:S.currentRound,mode:mode});
  fbSave();renderAll();toast('⏹ 第'+S.currentRound+'局結束');
  if(mode==='full'){openProj();setTimeout(trigCU,500);}
  else if(mode==='reveal'){openProj();setTimeout(trigRV,500);}
  else if(mode==='ceremony'){openProj();setTimeout(trigCE,500);}
}

/* ══════════════════════════════════════
   SETUP
══════════════════════════════════════ */
function drawSetup(){
  var g=function(id){return document.getElementById(id);};
  g('cname').value=S.name||'';
  var live=S.roundActive;
  g('rpanel').className='rpanel'+(live?' live':'');
  g('rinfo').innerHTML=live
    ?'<span style="color:var(--green);font-weight:700">● 第'+S.currentRound+'局進行中</span>'
    :(S.currentRound?'第'+S.currentRound+'局已結束':'尚未開局');
  g('btn-start').style.display=live?'none':'';
  g('btn-end').style.display=live?'':'none';
  document.querySelectorAll('.vis-opt').forEach(function(o){o.classList.toggle('on',o.dataset.v===(S.vis||'all'));});
  ['dual','round','total'].forEach(function(m){var b=g('bm-'+m);if(b)b.classList.toggle('on',(S.projMode||'dual')===m);});
  g('qrarea').style.display=live?'':'none';
  if(live){
    var u=pUrl();g('qrtxt').textContent=u;
    if(u.startsWith('http'))g('qrimg').src='https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(u);
  }
  g('teamlist').innerHTML=S.teams.map(function(t,i){
    return '<div style="display:grid;grid-template-columns:1fr 38px 32px;gap:8px;align-items:center;margin-bottom:8px">'
      +'<input type="text" value="'+x(t.name)+'" oninput="S.teams['+i+'].name=this.value;fbSave()">'
      +'<input type="color" value="'+t.color+'" onchange="S.teams['+i+'].color=this.value;fbSave()">'
      +'<button class="btn bgh bsm" onclick="rmTeam('+i+')">✕</button>'
      +'</div>';
  }).join('') || '<div style="color:var(--muted);padding:8px;font-size:13px">尚無組別</div>';
  var ts=S.teams.slice().sort(function(a,b){return(b.total||0)-(a.total||0);});
  g('totalboard').innerHTML=ts.length?ts.map(function(t,i){
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #3d255033;font-size:14px">'
      +'<span style="width:28px;text-align:center;font-weight:800;color:'+(i<3?['var(--champ)','var(--silver)','#cd9f60'][i]:'var(--muted)')+'">'+( i<3?MDL[i]:i+1)+'</span>'
      +'<span style="flex:1;font-weight:600;color:'+t.color+'">'+x(t.name)+'</span>'
      +'<span style="font-weight:800">'+(t.total||0)+'</span>'
      +'</div>';
  }).join(''):'<div style="color:var(--muted);font-size:13px">開局後顯示</div>';
}
function setVis(v){S.vis=v;fbSave();document.querySelectorAll('.vis-opt').forEach(function(o){o.classList.toggle('on',o.dataset.v===v);});}
function pUrl(){return location.hostname?location.origin+location.pathname+'?p=1':'⚠️ 請部署後使用';}
function copyUrl(){var u=pUrl();if(!u.startsWith('http')){toast('請先部署');return;}navigator.clipboard.writeText(u).then(function(){toast('✅ 連結已複製');});}

/* ══════════════════════════════════════
   TEAM OPS
══════════════════════════════════════ */
function quick(n){
  if(S.teams.length&&!confirm('清除現有組別？'))return;
  S.teams=[];S.hist=[];S.rounds=[];S.currentRound=0;S.roundActive=false;
  for(var i=0;i<n;i++){
    S.teams.push({id:'t'+(i+1),name:'第'+(i+1)+'組',color:COLORS[i%COLORS.length],score:0,total:0});
  }
  fbSave();renderAll();toast('已建立'+n+'組');
}
function addTeam(){
  var id='t'+Date.now();
  S.teams.push({id:id,name:'第'+(S.teams.length+1)+'組',color:COLORS[S.teams.length%COLORS.length],score:0,total:0});
  fbSave();drawSetup();
}
function rmTeam(idx){S.teams.splice(idx,1);fbSave();drawSetup();}
function resetAll(){if(!confirm('確定全部清除？'))return;S={name:S.name,teams:[],hist:[],rounds:[],currentRound:0,roundActive:false,vis:'all',projMode:'dual'};fbSave();renderAll();toast('已重置');}

/* ══════════════════════════════════════
   STATUS
══════════════════════════════════════ */
function drawStatus(){
  var live=S.roundActive;
  if(!isPlayer){
    document.getElementById('hdot').className='sdot'+(live?' live':'');
    document.getElementById('htxt').textContent=live?'第'+S.currentRound+'局進行中':(S.currentRound?'第'+S.currentRound+'局結束':'就緒');
    document.getElementById('hbadge').innerHTML=live?'<span class="rbadge">第'+S.currentRound+'局</span>':'';
  }else{
    document.getElementById('pdot').className='sdot'+(live?' live':'');
    document.getElementById('ptxt').textContent=live?x(S.name)+'・第'+S.currentRound+'局':'等待開局...';
    document.getElementById('pbadge').innerHTML=live?'<span class="rbadge">第'+S.currentRound+'局</span>':'';
  }
}

/* ══════════════════════════════════════
   PLAYER
══════════════════════════════════════ */
var pSel=null,addCD=false;
function drawPlayer(){
  if(!isPlayer)return;
  var live=S.roundActive;
  document.getElementById('pwait').style.display=live?'none':'';
  document.getElementById('pmain').style.display=live?'':'none';
  var ws=document.getElementById('pwsub');
  if(ws)ws.textContent=(S.currentRound>0&&!live)?'第'+S.currentRound+'局已結束，等待下一局':'開局後即可選擇組別加分';
  if(!live)return;
  /* 確認 pSel 的組別仍然存在 */
  if(pSel!==null){
    var found=false;
    for(var k=0;k<S.teams.length;k++){if(S.teams[k].id===pSel){found=true;break;}}
    if(!found)pSel=null;
  }
  document.getElementById('ptgrid').innerHTML=S.teams.map(function(t){
    var isSel=(pSel===t.id);
    return '<button class="tchip'+(isSel?' on':'')+'" style="'+(isSel?'border-color:'+t.color+';color:'+t.color:'')+'" onclick="pPick(\''+t.id+'\')">'+x(t.name)+'</button>';
  }).join('');
  if(!pSel){document.getElementById('ppanel').style.display='none';return;}
  /* 找 team */
  var t=null;
  for(var i=0;i<S.teams.length;i++){if(S.teams[i].id===pSel){t=S.teams[i];break;}}
  if(!t){pSel=null;document.getElementById('ppanel').style.display='none';return;}
  document.getElementById('ppanel').style.display='block';
  document.getElementById('pscore').textContent=t.score||0;
  document.getElementById('pname').textContent=x(t.name)+'・本局';
  var sorted=S.teams.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  var rank=0;for(var j=0;j<sorted.length;j++){if(sorted[j].id===t.id){rank=j+1;break;}}
  var vis=S.vis||'all';
  var rp=document.getElementById('prank');
  if(vis==='all'){rp.style.display='';rp.textContent='排名：第'+rank+'名 / 共'+S.teams.length+'組';}
  else if(vis==='rank'){rp.style.display='';rp.textContent='目前排名：第'+rank+'名';}
  else rp.style.display='none';
  document.getElementById('pagrid').innerHTML=[1,2,3,4,5,6].map(function(n){
    return '<button class="abtn" style="background:linear-gradient(135deg,'+t.color+','+t.color+'cc)" onclick="pAdd('+n+')">+'+n+'</button>';
  }).join('');
  var bc=document.getElementById('pbcard');
  bc.style.display=(vis==='all')?'':'none';
  if(vis==='all'){
    document.getElementById('pboard').innerHTML=sorted.map(function(v,i){
      return '<div class="mrow'+(v.id===t.id?' me':'')+'"><div class="mrnk" style="color:'+(i<3?['var(--champ)','var(--silver)','#cd9f60'][i]:'var(--muted)')+'">'+( i<3?MDL[i]:i+1)+'</div><div class="mnm" style="color:'+v.color+'">'+x(v.name)+'</div><div class="msc" style="color:'+(v.id===t.id?t.color:'var(--text)')+'">'+( v.score||0)+'</div></div>';
    }).join('');
  }
}
function pPick(id){pSel=id;drawPlayer();sfxAdd();}

function pAdd(n){
  if(addCD){toast('請稍候');return;}
  if(!S.roundActive){toast('等待開局');return;}
  if(!pSel){toast('請先選擇組別');return;}
  var idx=-1;
  for(var i=0;i<S.teams.length;i++){if(S.teams[i].id===pSel){idx=i;break;}}
  if(idx<0){toast('組別不存在，請重新選擇');pSel=null;drawPlayer();return;}
  var tname=S.teams[idx].name;
  var newScore=Math.min((S.teams[idx].score||0)+n,999999);
  S.teams[idx].score=newScore;
  /* ★ 版本號 +1，防止輪詢蓋掉剛加的分 */
  localVer=Date.now();
  S._ver=localVer;
  if(!S.hist)S.hist=[];
  S.hist.unshift({time:ts(),round:S.currentRound,team:tname,pts:n,by:'各組'});
  if(S.hist.length>500)S.hist.length=500;
  /* 立刻更新畫面 */
  drawPlayer();drawStatus();
  sfxAdd();toast(x(tname)+' +'+n+' ✨');
  /* 寫入 Firebase */
  fbSave();
  log('ADD',tname+' +'+n,{score:newScore,ver:localVer});
  addCD=true;setTimeout(function(){addCD=false;},500);
}

function pAddCustom(){
  var v=parseInt(document.getElementById('pcpts').value);
  if(!v||v<=0||v>999999){toast('請輸入1-999999');return;}
  pAdd(v);document.getElementById('pcpts').value='';
}

/* ══════════════════════════════════════
   ADMIN
══════════════════════════════════════ */
function drawAdmin(){
  document.getElementById('adminlbl').textContent=S.roundActive?'第'+S.currentRound+'局・主持人加減分':'主持人加減分';
  var sorted=S.teams.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  document.getElementById('adminlist').innerHTML=sorted.map(function(t,i){
    return '<div class="arow">'
      +'<div style="width:14px;height:14px;background:'+t.color+';border-radius:50%;flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0"><div style="font-weight:700;color:'+t.color+'">'+x(t.name)+'</div><div style="font-size:11px;color:var(--muted)">第'+(i+1)+'名</div></div>'
      +'<div class="asc" style="color:'+t.color+'">'+(t.score||0)+'</div>'
      +'<div class="actrl"><input type="number" id="ai_'+t.id+'" placeholder="分" min="1" max="999">'
      +'<button class="btn bg bsm" onclick="aDo(\''+t.id+'\',1)">＋</button>'
      +'<button class="btn br bsm" onclick="aDo(\''+t.id+'\',-1)">－</button></div>'
      +'</div>';
  }).join('');
  document.getElementById('hlist').innerHTML=(S.hist&&S.hist.length)
    ?S.hist.slice(0,120).map(function(h){
      return '<div class="hrow"><span class="ht">'+h.time+'</span><span style="font-weight:600">'+x(h.team)+'</span><span style="color:var(--muted);font-size:11px">'+h.by+' R'+(h.round||0)+'</span><span class="hp '+(h.pts>=0?'pos':'negc')+'">'+(h.pts>0?'+':'')+h.pts+'</span></div>';
    }).join('')
    :'<div style="color:var(--muted);padding:8px">尚無記錄</div>';
}
function aDo(id,sign){
  var inp=document.getElementById('ai_'+id);if(!inp)return;
  var v=parseInt(inp.value)||1;
  var idx=-1;for(var i=0;i<S.teams.length;i++){if(S.teams[i].id===id){idx=i;break;}}
  if(idx<0)return;
  var pts=v*sign;
  S.teams[idx].score=Math.max(0,(S.teams[idx].score||0)+pts);
  if(!S.hist)S.hist=[];
  S.hist.unshift({time:ts(),round:S.currentRound||0,team:S.teams[idx].name,pts:pts,by:'主持人'});
  fbSave();renderAll();toast(x(S.teams[idx].name)+' '+(pts>0?'+':'')+pts);inp.value='';
}
function clearHist(){if(confirm('清除歷史？')){S.hist=[];fbSave();drawAdmin();}}
function exportCSV(mode){
  var hist=S.hist||[];
  var data=mode==='round'?hist.filter(function(h){return h.round===S.currentRound;}):hist;
  if(!data.length){toast('尚無紀錄');return;}
  var rows=[['局次','時間','組別','分數','操作人']].concat(data.map(function(h){return[h.round||0,h.time,h.team,h.pts,h.by];}));
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.map(function(r){return r.join(',');}).join('\n'));
  a.download='婕樂纖_R'+(S.currentRound||0)+'_'+mode+'.csv';a.click();
}

/* ══════════════════════════════════════
   PROJ
══════════════════════════════════════ */
var ptick=null;
function onRz(){sizeProj();}
function openProj(){
  document.getElementById('proj').classList.add('on');
  /* 先設定尺寸再渲染 */
  sizeProj();
  /* 稍等一幀確保 DOM 更新完才渲染內容 */
  setTimeout(function(){
    renderProj();
    if(ptick)clearInterval(ptick);
    ptick=setInterval(renderProj,2000);
  },50);
  window.removeEventListener('resize',onRz);window.addEventListener('resize',onRz);
  document.getElementById('proj').requestFullscreen&&document.getElementById('proj').requestFullscreen().catch(function(){});
}
function closeProj(){
  document.getElementById('proj').classList.remove('on');
  if(ptick){clearInterval(ptick);ptick=null;}
  window.removeEventListener('resize',onRz);
  document.fullscreenElement&&document.exitFullscreen&&document.exitFullscreen().catch(function(){});
}
function sizeProj(){
  var W=window.innerWidth,H=window.innerHeight,w=W,h=W*9/16;
  if(h>H){h=H;w=H*16/9;}
  var s=document.getElementById('pstage');
  s.style.cssText='width:'+w+'px;height:'+h+'px;left:'+((W-w)/2)+'px;top:'+((H-h)/2)+'px;overflow:hidden;display:flex;flex-direction:column;position:absolute';
  s.style.fontSize=(w/80)+'px';
}
function setPM(m){S.projMode=m;fbSave();renderAll();}
function renderProj(){
  var st=document.getElementById('pstage');if(!st)return;
  /* 若 pstage 沒有尺寸，先 sizeProj */
  if(!st.style.width||parseFloat(st.style.width)<100){sizeProj();return;}
  var W=parseFloat(st.style.width),H=parseFloat(st.style.height);
  var n=Math.max(S.teams.length,1),mode=S.projMode||'dual';
  document.getElementById('ptitle').textContent=S.name||'婕樂纖';
  document.getElementById('ptitle').style.fontSize=Math.round(H*.042)+'px';
  document.getElementById('pround').textContent=S.roundActive?'第'+S.currentRound+'局 LIVE':(S.currentRound?'第'+S.currentRound+'局結束':'待機');
  var now=new Date(),pad=function(v){return String(v).padStart(2,'0');};
  document.getElementById('pclk').textContent=pad(now.getMonth()+1)+'/'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  var hH=Math.round(H*.11),fH=Math.round(H*.08),bH=H-hH-fH;
  document.getElementById('ph').style.cssText='height:'+hH+'px;font-size:'+Math.round(hH*.28)+'px;flex-shrink:0';
  document.getElementById('pft').style.cssText='height:'+fH+'px;font-size:'+Math.round(fH*.28)+'px;flex-shrink:0';
  /* 明確設定 pboards 高度，不依賴 flex:1 */
  var pb=document.getElementById('pboards');
  pb.style.height=bH+'px';
  pb.style.maxHeight=bH+'px';
  var gap=Math.max(3,Math.round(bH/n*.07)),rowH=Math.max(28,Math.floor((bH-(n-1)*gap)/n));
  var barH=Math.max(4,Math.round(rowH*.18));
  var rnkFs=Math.max(12,Math.round(rowH*.46)),nmFs=Math.max(10,Math.round(rowH*.30)),scFs=Math.max(12,Math.round(rowH*.42));
  var ctFs=Math.max(10,Math.round(hH*.20)),ctH=ctFs+Math.round(bH*.025);
  var pb=document.getElementById('pboards');
  pb.className='pboards '+(mode==='dual'?'dual':'single');
  pb.style.cssText='padding:'+Math.round(H*.01)+'px 2% 0;gap:2%;align-items:start;overflow:hidden';
  function mkCol(sorted,getV,maxV,label){
    return '<div class="pcol"><div class="pcol-title" style="font-size:'+ctFs+'px;height:'+ctH+'px;line-height:'+ctH+'px">'+label+'</div><div>'
      +sorted.map(function(t,i){
        var sc=getV(t),pct=maxV>0?Math.round(sc/maxV*100):0;
        var cls=i<3?['r1','r2','r3'][i]:'rn';
        var medal=i<3?MDL[i]:'<span style="font-size:'+Math.round(rnkFs*.72)+'px">'+(i+1)+'</span>';
        return '<div class="prow '+cls+'" style="height:'+rowH+'px;margin-bottom:'+gap+'px">'
          +'<div class="prnk" style="font-size:'+rnkFs+'px">'+medal+'</div>'
          +'<div class="pnm" style="font-size:'+nmFs+'px;color:'+t.color+'">'+x(t.name)+'</div>'
          +'<div class="pbw" style="height:'+barH+'px"><div class="pbf" style="width:'+pct+'%;background:'+t.color+'"></div></div>'
          +'<div class="psc" style="font-size:'+scFs+'px">'+sc+'</div>'
          +'</div>';
      }).join('')+'</div></div>';
  }
  var byR=S.teams.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  var byT=S.teams.slice().sort(function(a,b){return(b.total||0)-(a.total||0);});
  var maxR=0;byR.forEach(function(t){if((t.score||0)>maxR)maxR=t.score||0;});if(!maxR)maxR=1;
  var maxT=0;byT.forEach(function(t){if((t.total||0)>maxT)maxT=t.total||0;});if(!maxT)maxT=1;
  if(mode==='dual')pb.innerHTML=mkCol(byR,function(t){return t.score||0;},maxR,'本 局 得 分')+mkCol(byT,function(t){return t.total||0;},maxT,'累 計 總 分');
  else if(mode==='round')pb.innerHTML=mkCol(byR,function(t){return t.score||0;},maxR,'本 局 得 分');
  else pb.innerHTML=mkCol(byT,function(t){return t.total||0;},maxT,'累 計 總 分');
}

/* ══════════════════════════════════════
   SOUND
══════════════════════════════════════ */
var sndStyle='classic',actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
function tone(f,d,tp,v,delay){if(sndStyle==='off')return;try{var c=ac(),t=c.currentTime+(delay||0),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v||.3,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.start(t);o.stop(t+d);}catch(e){}}
function sfxAdd(){if(sndStyle==='classic'){tone(523,.08,'sine',.2);tone(659,.1,'sine',.25,.09);}else if(sndStyle==='edm'){tone(800,.05,'square',.18);tone(1000,.05,'square',.14,.06);}}
function sfxStart(){if(sndStyle==='classic'){[523,659,784,1047].forEach(function(f,i){tone(f,.2,'sine',.3,i*.15);});}else if(sndStyle==='edm'){[400,600,800,1200].forEach(function(f,i){tone(f,.1,'sawtooth',.2,i*.1);});}}
function sfxRev(){if(sndStyle==='classic'){tone(392,.1,'sine',.2);tone(523,.15,'sine',.3,.12);tone(659,.3,'sine',.35,.28);}else if(sndStyle==='edm'){[300,500,700,900].forEach(function(f,i){tone(f,.08,'square',.18,i*.08);});}}
function sfxWin(){if(sndStyle==='classic'){[[523,.15],[659,.15],[784,.15],[1047,.3],[784,.1],[1047,.5]].forEach(function(a,i){tone(a[0],a[1],'sine',.4,i*.18);});}else if(sndStyle==='edm'){[[400,.1],[600,.1],[800,.1],[1000,.1],[1200,.1],[1400,.3]].forEach(function(a,i){tone(a[0],a[1],'sawtooth',.22,i*.12);});}}
function sfxConf(){for(var i=0;i<8;i++)tone(300+Math.random()*800,.1,sndStyle==='edm'?'square':'sine',.14,i*.05);}
function setSnd(s){sndStyle=s;['classic','edm','off'].forEach(function(k){document.getElementById('snd-'+k).classList.toggle('on',k===s);});if(s!=='off'){ac();sfxAdd();}toast({classic:'🎼 典禮音效',edm:'🎵 電音模式',off:'🔇 已靜音'}[s]);}

/* ══════════════════════════════════════
   CEREMONY
══════════════════════════════════════ */
function hideAll(){['CU','RV','CE'].forEach(function(id){document.getElementById(id).classList.remove('on');});}
function closeCer(){hideAll();}
var cuQ=[];
function trigCU(){
  hideAll();
  cuQ=S.teams.slice().sort(function(a,b){return(a.score||0)-(b.score||0);});
  var H=parseFloat(document.getElementById('pstage').style.height)||720;
  document.getElementById('cuname').style.fontSize=Math.round(H*.07)+'px';
  document.getElementById('cunum').style.fontSize=Math.round(H*.20)+'px';
  document.getElementById('CU').classList.add('on');showCU();
}
function showCU(){
  if(!cuQ.length){document.getElementById('cubtn').style.display='none';return;}
  var t=cuQ.shift();
  document.getElementById('cuname').textContent=t.name;document.getElementById('cuname').style.color=t.color;
  document.getElementById('cunum').style.color=t.color;document.getElementById('cubtn').style.display='none';
  var cur=0,target=t.score||0;
  if(!target){document.getElementById('cunum').textContent=0;showCBtn(!cuQ.length);return;}
  var step=Math.max(1,Math.round(target/40));
  var iv=setInterval(function(){cur=Math.min(cur+step,target);document.getElementById('cunum').textContent=cur;if(cur>=target){clearInterval(iv);sfxRev();showCBtn(!cuQ.length);}},35);
}
function showCBtn(last){var b=document.getElementById('cubtn');b.style.display='block';b.textContent=last?'進入揭曉 🏅':'下一組 ▶';}
function cuNext(){if(cuQ.length)showCU();else trigRV();}
var rvQ=[],rvSorted=[];
function trigRV(){
  hideAll();
  rvSorted=S.teams.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  rvQ=S.teams.slice().sort(function(a,b){return(a.score||0)-(b.score||0);});
  var H=parseFloat(document.getElementById('pstage').style.height)||720;
  ['rvbadge','rvrank','rvname','rvscore'].forEach(function(id,i){document.getElementById(id).style.fontSize=Math.round(H*[.12,.04,.10,.05][i])+'px';});
  document.getElementById('RV').classList.add('on');showRV();
}
function showRV(){
  if(!rvQ.length){var b=document.getElementById('rvbtn');b.style.display='block';b.textContent='🎊 進入頒獎';return;}
  var t=rvQ.shift();
  var rank=0;for(var i=0;i<rvSorted.length;i++){if(rvSorted[i].id===t.id){rank=i+1;break;}}
  var rv=document.getElementById('RV');rv.classList.remove('on');void rv.offsetWidth;rv.classList.add('on');
  document.getElementById('rvbadge').textContent=rank<=3?MDL[rank-1]:'#'+rank;
  document.getElementById('rvrank').textContent='第 '+rank+' 名';
  document.getElementById('rvname').textContent=t.name;document.getElementById('rvname').style.color=t.color;
  document.getElementById('rvscore').textContent=(t.score||0)+' 分';
  if(rank===1)sfxWin();else sfxRev();
  var b=document.getElementById('rvbtn');b.style.display='block';b.textContent=rvQ.length?'下一名 ▶':'🎊 進入頒獎';
}
function rvNext(){if(rvQ.length)showRV();else trigCE();}
function trigCE(){
  hideAll();sfxConf();
  var st=document.getElementById('pstage'),W=parseFloat(st.style.width)||1280,H=parseFloat(st.style.height)||720;
  var sorted=S.teams.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  document.getElementById('CE').classList.add('on');
  var layer=document.getElementById('conflayer');layer.innerHTML='';
  for(var i=0;i<150;i++){var d=document.createElement('div');d.className='conf';var sz=Math.random()*12+5;d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;border-radius:'+(Math.random()>.5?'50%':'2px')+';background:'+CC[i%CC.length]+';animation-duration:'+(2+Math.random()*3)+'s;animation-delay:'+(Math.random()*2.5)+'s';layer.appendChild(d);}
  var top3=sorted.slice(0,Math.min(3,sorted.length));
  var podH=Math.round(H*.28),podW=Math.round(W*.17);
  var bh=[Math.round(podH*.55),podH,Math.round(podH*.38)];
  var order=top3.length>=2?[top3[1],top3[0],top3[2]||null]:[top3[0],null,null];
  var rOf=[2,1,3];
  var nFs=Math.max(14,Math.round(W*.018)),sFs=Math.max(12,Math.round(W*.012)),rFs=Math.max(22,Math.round(W*.032));
  document.getElementById('podium').innerHTML=order.map(function(t,i){
    if(!t)return '<div style="width:'+podW+'px"></div>';
    var r=rOf[i];
    var gc=r===1?'linear-gradient(135deg,#3a2800,#1a1028)':r===2?'linear-gradient(135deg,#252535,#1a1028)':'linear-gradient(135deg,#2a1800,#1a1028)';
    var bord=r===1?'var(--champ)':r===2?'var(--silver)':'#cd9f60';
    return '<div class="pod-col" style="width:'+podW+'px"><div style="font-size:'+rFs+'px">'+MDL[r-1]+'</div><div style="font-weight:800;font-size:'+nFs+'px;color:'+t.color+';text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:'+podW+'px">'+x(t.name)+'</div><div style="font-size:'+sFs+'px;color:'+t.color+';opacity:.8">'+(t.score||0)+' 分</div><div style="height:'+bh[i]+'px;width:'+podW+'px;background:'+gc+';border:2px solid '+bord+';border-radius:10px 10px 0 0"></div></div>';
  }).join('');
  var sub=document.getElementById('cersub');
  sub.style.cssText='font-size:'+Math.round(H*.04)+'px;background:linear-gradient(135deg,var(--rose),var(--champ));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text';
  sub.textContent='✨ 恭喜所有參賽者 ✨';
  document.querySelector('.cer-btn').style.fontSize=Math.round(H*.025)+'px';
}

   RENDER ALL
══════════════════════════════════════ */
function renderAll(){
  drawStatus();
  if(!isPlayer){drawSetup();drawAdmin();}
  else drawPlayer();
  if(document.getElementById('proj').classList.contains('on'))renderProj();
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function ts(){var d=new Date(),p=function(v){return String(v).padStart(2,'0');};return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.getElementById('toastel');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2400);}
</script>
